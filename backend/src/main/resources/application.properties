spring.application.name=backend
spring.config.import=optional:file:./.env[.properties],optional:file:./backend/.env[.properties]
server.port=${SERVER_PORT:8080}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5433/signhub}
spring.datasource.username=${DB_USERNAME:signhub}
spring.datasource.password=${DB_PASSWORD:signhub}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:86400}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

spaces.access-key=${SPACES_ACCESS_KEY}
spaces.secret-key=${SPACES_SECRET_KEY}
spaces.bucket=${SPACES_BUCKET:sign-hub}
spaces.region=${SPACES_REGION:sgp1}
spaces.endpoint=${SPACES_ENDPOINT:https://sign-hub.sgp1.digitaloceanspaces.com}

spring.servlet.multipart.max-file-size=${MAX_UPLOAD_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MAX_UPLOAD_REQUEST_SIZE:10MB}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:google-client-id-not-configured}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:google-client-secret-not-configured}
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}
app.oauth2.redirect-uri-frontend=${OAUTH2_REDIRECT_URI_FRONTEND:http://localhost:3000/oauth2/success}

