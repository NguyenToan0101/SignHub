services:
  postgres:
    image: postgres:16-alpine
    container_name: signhub-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-signhub}
      POSTGRES_USER: ${POSTGRES_USER:-signhub}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-signhub}
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    volumes:
      - signhub_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: ${BACKEND_IMAGE:-signhub-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: signhub-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-signhub}
      DB_USERNAME: ${POSTGRES_USER:-signhub}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-signhub}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      JWT_SECRET: ${JWT_SECRET:-404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-86400}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
      SPACES_BUCKET: ${SPACES_BUCKET:-sign-hub}
      SPACES_REGION: ${SPACES_REGION:-sgp1}
      SPACES_ENDPOINT: ${SPACES_ENDPOINT:-https://sign-hub.sgp1.digitaloceanspaces.com}
      OAUTH2_REDIRECT_URI_FRONTEND: ${OAUTH2_REDIRECT_URI_FRONTEND:-http://localhost:3000/oauth2/success}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    image: ${FRONTEND_IMAGE:-signhub-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
    container_name: signhub-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    depends_on:
      - backend

volumes:
  signhub_postgres_data:
